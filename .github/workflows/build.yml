name: Build and Test

on:
  push:
    branches:
      - main
      - feature/v4.0
  pull_request:
    branches: ["main", "feature/v4.0"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: ExpressoTS Tests
        run: npm run test
        env:
          CI: true

      - name: Run Code Coverage
        run: npm run coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          working-directory: .
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: expressots/expressots

  ts7-compat:
    name: TypeScript 7 compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Type-check with TypeScript 7
        run: npx --yes -p typescript@7 tsc -p tsconfig.cjs.json --noEmit
